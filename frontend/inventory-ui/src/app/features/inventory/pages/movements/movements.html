<div class="container py-5">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>


            <h2 class="fw-bold mb-4">
                Movimientos del producto
            </h2>

            <p class="text-muted mb-0">
                Agrega o quita stock de tu producto.
            </p>
        </div>

        <button class="btn btn-outline-secondary" (click)="backInventory()">
            Volver
        </button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">
                    Producto
                </label>

                <div class="input-group mb-3">
                    <span class="input-group-text">Producto</span>
                    <input type="text" class="form-control" [value]="product.name" disabled />
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">Cantidad</span>
                    <input type="text" class="form-control" [(ngModel)]="product.quantity" disabled />
                </div>

                <div class="input-group mb-3">
                    <button class="btn btn-outline-success" type="button" (click)="increase()">Guardar entrada</button>
                    <input type="text" class="form-control" placeholder="0" [(ngModel)]="quantity"
                        (ngModelChange)="validateQuantity()" (keydown)="onlyNumbers($event)" [maxlength]="6" min="0" />
                    <button class="btn btn-outline-danger" type="button" (click)="decrease()">Guardar salida</button>
                </div>
            </div>
        </div>
    </div>
</div>
